<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="star-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
  </defs>

  <!-- 背景 (rounded square) -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- 星 (Star) - ゴールドグラデーション -->
  <path d="M 42 14 L 52 36 L 76 36 L 57 52 L 65 74 L 42 59 L 19 74 L 27 52 L 8 36 L 32 36 Z"
        fill="url(#star-grad)"/>

  <!-- 上昇矢印 (Rising Arrow) - グリーン -->
  <path d="M 80 38 L 90 58 L 84 58 L 84 80 L 76 80 L 76 58 L 70 58 Z"
        fill="url(#arrow-grad)"/>
</svg>
