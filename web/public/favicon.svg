<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .star { fill: #FFF; }
        .arrow { fill: #FFF; }
      }
      @media (prefers-color-scheme: light) {
        .star { fill: #1a1a1a; }
        .arrow { fill: #1a1a1a; }
      }
    </style>
  </defs>

  <!-- 星 (Star) -->
  <path class="star" d="M 50 15 L 61 40 L 88 40 L 67 57 L 78 82 L 50 65 L 22 82 L 33 57 L 12 40 L 39 40 Z"/>

  <!-- 上昇矢印 (Rising Arrow) -->
  <path class="arrow" d="M 70 60 L 85 45 L 80 50 L 80 75 L 75 75 L 75 50 Z" opacity="0.8"/>
</svg>
