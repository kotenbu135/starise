name: Daily Batch

on:
  schedule:
    - cron: '0 15 * * *'  # 毎日 00:00 JST (15:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: batch-data-update
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: batch/go.mod
          cache-dependency-path: batch/go.sum

      # Fresh DB each run — data/ (committed to repo) is the source of truth.
      # --restore-from rebuilds daily_stars history from data/repos/*.json so
      # yesterday's snapshots survive across runs without depending on GitHub
      # Actions cache.
      #
      # --allow-empty-rankings: production export must always proceed, even on
      # the bootstrap day when data/ has no history yet (issue #2 v3 rewrite
      # wiped data/). I12 still catches in-process compute regressions in the
      # test suite; here we never want to block daily JSON publish.
      # GEMINI_API_KEY is optional. When unset, the pipeline logs
      # "translate disabled: GEMINI_API_KEY not set" and skips the
      # translate step entirely; existing cached translations under
      # data/translations/ are still injected into description_ja by
      # export, and missing entries fall back to the English original
      # in the frontend. To enable daily incremental translation, add
      # GEMINI_API_KEY as a repository secret.
      - name: Run batch
        working-directory: batch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          rm -f starise.db starise.db-shm starise.db-wal
          go run . run \
            --seed-file seeds.txt \
            --out-dir ../data \
            --restore-from ../data \
            --preset \
            --discover-concurrency 1 \
            --allow-empty-rankings \
            --translate-provider gemini \
            --translate-cache-dir ../data/translations \
            --translate-limit 1000 \
            --translate-batch-size 50

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "chore: update star data $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          echo "::error::Push failed after 3 attempts"
          exit 1
