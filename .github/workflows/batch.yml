name: Daily Batch

on:
  schedule:
    - cron: '0 15 * * *'  # 毎日 00:00 JST (15:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: batch-data-update
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: batch/go.mod
          cache-dependency-path: batch/go.sum

      # Fresh DB each run — data/ (committed to repo) is the source of truth.
      # Phase 0 (restore) rebuilds the DB from data/repos/*.json so daily_stars
      # history survives across runs without depending on GitHub Actions cache.
      - name: Run batch
        working-directory: batch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f starise.db starise.db-shm starise.db-wal
          go run . run --seed-file seeds.txt --out-dir ../data

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "chore: update star data $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          echo "::error::Push failed after 3 attempts"
          exit 1
