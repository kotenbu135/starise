name: Daily Batch

on:
  schedule:
    - cron: '0 15 * * *'  # 毎日 00:00 JST (15:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: batch-data-update
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: batch/go.mod
          cache-dependency-path: batch/go.sum

      - name: Restore SQLite cache
        uses: actions/cache/restore@v5
        with:
          path: batch/starise.db
          key: starise-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            starise-db-${{ github.ref_name }}-
            starise-db-

      - name: Run batch
        working-directory: batch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run . run --seed-file seeds.txt --out-dir ../data

      - name: Save SQLite cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: batch/starise.db
          key: starise-db-${{ github.ref_name }}-${{ github.run_id }}

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "chore: update star data $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          echo "::error::Push failed after 3 attempts"
          exit 1
